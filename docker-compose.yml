services:
  # ============================================================
  # PostgreSQL — Relational Database (ACID)
  # ============================================================
  postgres:
    image: postgres:15
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce_pass}
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/triggers.sql:/docker-entrypoint-initdb.d/01_triggers.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce_user -d ecommerce_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================
  # MongoDB — NoSQL Database (BASE)
  # ============================================================
  mongodb:
    image: mongo:7
    container_name: ecommerce-mongodb
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-ecommerce_nosql}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================
  # FastAPI Backend
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://ecommerce_user:ecommerce_pass@postgres:5432/ecommerce_db}
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017}
      MONGO_DB: ${MONGO_DB:-ecommerce_nosql}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-to-a-random-secret-key}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: "${JWT_EXPIRE_MINUTES:-60}"
      FRAUD_EVENT_THRESHOLD: "${FRAUD_EVENT_THRESHOLD:-10}"
      FRAUD_TIME_WINDOW_SECONDS: "${FRAUD_TIME_WINDOW_SECONDS:-60}"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./data:/data
      - ./backend/benchmark/plots:/app/benchmark/plots
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ============================================================
  # React Frontend (Vite)
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend/src:/app/src
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================================
  # Data Loader — One-shot service that loads CSV data into
  # both databases, then exits. Comment this out after the
  # first run if you don't need fresh data every time.
  # ============================================================
  data-loader:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce-data-loader
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://ecommerce_user:ecommerce_pass@postgres:5432/ecommerce_db}
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017}
      MONGO_DB: ${MONGO_DB:-ecommerce_nosql}
      PYTHONUNBUFFERED: "1"
      DEMO_MODE: ${DEMO_MODE:-true}
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./data:/data
    command: python data_loader.py
    restart: "no"

  # ============================================================
  # DB Reset — One-shot service that wipes ALL data from both
  # databases. Run explicitly with:
  #   docker-compose --profile reset up reset-db
  # ============================================================
  reset-db:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce-reset-db
    profiles:
      - reset
    environment:
      DATABASE_URL: postgresql://ecommerce_user:ecommerce_pass@postgres:5432/ecommerce_db
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: ecommerce_nosql
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python reset_db.py
    restart: "no"

volumes:
  postgres_data:
  mongo_data:
