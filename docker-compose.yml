services:
  # ============================================================
  # PostgreSQL — Relational Database (ACID)
  # ============================================================
  postgres:
    image: postgres:15
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: ecommerce_user
      POSTGRES_PASSWORD: ecommerce_pass
      POSTGRES_DB: ecommerce_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/triggers.sql:/docker-entrypoint-initdb.d/01_triggers.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce_user -d ecommerce_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================
  # MongoDB — NoSQL Database (BASE)
  # ============================================================
  mongodb:
    image: mongo:7
    container_name: ecommerce-mongodb
    environment:
      MONGO_INITDB_DATABASE: ecommerce_nosql
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================
  # FastAPI Backend
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce-backend
    environment:
      DATABASE_URL: postgresql://ecommerce_user:ecommerce_pass@postgres:5432/ecommerce_db
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: ecommerce_nosql
      JWT_SECRET_KEY: change-this-to-a-random-secret-key
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "60"
      FRAUD_EVENT_THRESHOLD: "10"
      FRAUD_TIME_WINDOW_SECONDS: "60"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./data:/data
      - ./backend/benchmark/plots:/app/benchmark/plots

  # ============================================================
  # React Frontend (Vite)
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres_data:
  mongo_data:
